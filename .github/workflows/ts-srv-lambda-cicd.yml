name: "TypeScript Services Lambda CI/CD"

on:
  workflow_call:
    inputs:
      function_name:
        description: "AWS Lambda function name to update"
        required: true
        type: string
      aws_region:
        description: "AWS region where the Lambda lives"
        required: false
        type: string
        default: "eu-west-1"
      node_version:
        description: "Node.js version used for build and tests"
        required: false
        type: string
        default: "20.x"
      working_directory:
        description: "Path within the repo where package.json lives"
        required: false
        type: string
        default: "."
      install_command:
        description: "Command to install dependencies"
        required: false
        type: string
        default: "npm ci"
      test_command:
        description: "Command to run unit tests"
        required: false
        type: string
        default: "npm test"
      package_command:
        description: "Command that produces the deployment zip"
        required: false
        type: string
        default: "npm run package"
      artifact_path:
        description: "Path (relative to working_directory) of the zip produced by package_command"
        required: false
        type: string
        default: "function.zip"
      publish_version:
        description: "Publish a new Lambda version after updating the code"
        required: false
        type: boolean
        default: false
      skip_tests:
        description: "Skip test execution"
        required: false
        type: boolean
        default: false
      skip_deploy:
        description: "Skip the deploy step (build + test only)"
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      NPM_AUTH_TOKEN:
        required: false
    outputs:
      function_version:
        description: "Lambda version published (empty when publish_version is false)"
        value: ${{ jobs.deploy.outputs.function_version }}

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - name: Install dependencies
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: ${{ inputs.install_command }}

      - name: Run tests
        run: ${{ inputs.test_command }}

  build:
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ !cancelled() && !failure() }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - name: Install dependencies
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: ${{ inputs.install_command }}

      - name: Package Lambda
        run: ${{ inputs.package_command }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: ${{ inputs.working_directory }}/${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ !inputs.skip_deploy && !cancelled() && !failure() }}
    outputs:
      function_version: ${{ steps.publish.outputs.version }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: artifact

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Update function code
        run: |
          ZIP_FILE="$(find artifact -type f -name '*.zip' | head -n 1)"
          if [ -z "$ZIP_FILE" ]; then
            echo "::error::No zip file found in downloaded artifact"
            exit 1
          fi
          aws lambda update-function-code \
            --function-name "${{ inputs.function_name }}" \
            --zip-file "fileb://$ZIP_FILE" \
            > /dev/null

      - name: Wait for function update
        run: |
          aws lambda wait function-updated \
            --function-name "${{ inputs.function_name }}"

      - name: Publish version
        id: publish
        if: ${{ inputs.publish_version }}
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name "${{ inputs.function_name }}" \
            --description "git ${GITHUB_SHA::7} from ${GITHUB_REF_NAME}" \
            --query 'Version' --output text)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Published version $VERSION"
